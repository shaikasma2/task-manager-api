name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t task-manager-api .

      - name: Run container
        run: docker run -d -p 5000:5000 task-manager-api
